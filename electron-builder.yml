appId: com.ternimal.app
productName: Ternimal
directories:
  output: release
  buildResources: build
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: TerminalEmulator
  icon: build
  maintainer: Ternimal
  vendor: Ternimal
  synopsis: Standalone terminal emulator
  description: A standalone terminal emulator built with xterm.js and node-pty, based on VS Code terminal architecture.
  executableArgs:
    - --no-sandbox
files:
  - dist/**/*
  - node_modules/node-pty/**/*
  - "!vscode-src"
  - "!release"
afterPack: ./build/afterPack.js
